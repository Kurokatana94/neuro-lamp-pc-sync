<head>
    <title>Neuro Lamp Sync</title>
    <meta publisher="Kurokatana94"/>
    <meta description="Basic solid/fade color effect template for Neuro Lamp Sync."/>
    <meta property="defaultColor" label="Default Color Control" type="color" default="#c70035" min="0" max="360"/>
    
    <!-- Check explanation below for Pause Effect functionality -->
    <!-- <meta property="pauseEffect" label="Pause Effect" type="boolean" default="0"/>   -->
</head>

<body style="margin: 0; padding: 0;">
    <canvas id="exCanvas" width="320" height="200"></canvas>
</body>

<script>
    // Basic values required by SignalRGB for the effect to work
    var c = document.getElementById("exCanvas");
    var ctx = c.getContext("2d");
    var width = 320;
    var height = 200;

    var name = "Neuro Lamp Sync";
    var type = "solid";
    var description = "Basic solid/fade color effect template for Neuro Lamp Sync.";

    // DO NOT CHANGE THESE VALUES NAMES! They are scanned and updated using a regex pattern, so changing them will break the functionality of the effect.
    var currentColor = "#66a8ff";
    var targetColor = "#1dffdb";
    var speed = 800; // Speed of color change in milliseconds
    var isLive = false;
    
    /**
     *  Resets to default color when effect is not live.
     */
    function setDefaultColor() {
        ctx.fillStyle = defaultColor;
        ctx.fillRect(0, 0, width, height);

        window.requestAnimationFrame(setDefaultColor);
    }

    /**
     * Fades the current color to the target color over time.
     * If the effect is not live, it will display the default color.
     * 
     * Uses speed variable to determine how long the fade should take.
     */
    function fadeToTargetColor() {
        // For paused effect use simply 
        // if (!isLive || resolvedPausedState(pauseEffect)) {
        if (!isLive) {
            window.requestAnimationFrame(setDefaultColor);
        } else {
            var startTime = performance.now();
            
            if (currentColor !== targetColor) {
                window.requestAnimationFrame(updateColor);
            }
    
            function updateColor() {
                var currentTime = performance.now();
                var elapsedTime = currentTime - startTime;
                var progress = Math.min(elapsedTime / speed, 1);
    
                // Interpolate between currentColor and targetColor
                var r1 = parseInt(currentColor.slice(1, 3), 16);
                var g1 = parseInt(currentColor.slice(3, 5), 16);
                var b1 = parseInt(currentColor.slice(5, 7), 16);
    
                var r2 = parseInt(targetColor.slice(1, 3), 16);
                var g2 = parseInt(targetColor.slice(3, 5), 16);
                var b2 = parseInt(targetColor.slice(5, 7), 16);
    
                var r = Math.round(r1 + (r2 - r1) * progress);
                var g = Math.round(g1 + (g2 - g1) * progress);
                var b = Math.round(b1 + (b2 - b1) * progress);
    
                currentColor = `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
    
                // Fill the canvas with the current color
                ctx.fillStyle = currentColor;
                ctx.fillRect(0, 0, width, height);
    
                if (progress < 1) {
                    window.requestAnimationFrame(updateColor);
                }
            }
        }

    }

    // To add a pause state uncomment the pauseEffect meta tag in the head section and uncomment the resolvePausedState function below. Then, you can use the pauseEffect property to control the effect's paused state.
    
    // ======== EPILESPSY WARNING: This feature is not stable and if used while Neuro is live it will cause flickering. =======
    
    // If a variant of this effect is created with a pause state, let the user know beforehand!
    // function resolvePausedState(state) {
    //     if (typeof state === "undefined") {
    //         return false;
    //     }
    //     return state === true || state === 1 || state === "1";
    // }


    // Any meta property set by the user in SignalRGB are availablke as global variables ONLY after the first requestAnimationFrame is called!
    window.requestAnimationFrame(fadeToTargetColor);

</script>
