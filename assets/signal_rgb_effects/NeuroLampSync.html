<head>
    <title>Neuro Lamp Sync</title>
    <meta publisher="Kurokatana94"/>
    <meta description="Basic solid/fade color effect for Neuro Lamp Sync."/>
    <meta property="defaultColor" label="Default Color Control" type="color" default="#c70035" min="0" max="360"/>
</head>

<body style="margin: 0; padding: 0;">
    <canvas id="exCanvas" width="320" height="200"></canvas>
</body>

<script>
    var c = document.getElementById("exCanvas");
    var ctx = c.getContext("2d");
    var width = 320;
    var height = 200;

    var name = "Neuro Lamp Sync";
    var type = "solid";
    var description = "A simple color cycling lamp effect that can be used for neurofeedback or relaxation purposes.";

    var currentColor = "#66a8ff";
    var targetColor = "#1dffdb";
    var speed = 800; // Speed of color change in milliseconds

    var isLive = false;
    
    function setDefaultColor() {
        ctx.fillStyle = defaultColor;
        ctx.fillRect(0, 0, width, height);

        window.requestAnimationFrame(setDefaultColor);
    }

    function fadeToTargetColor() {
        if (!isLive) {
            window.requestAnimationFrame(setDefaultColor);
        } else {
            var startTime = performance.now();
            
            if (currentColor !== targetColor) {
                window.requestAnimationFrame(updateColor);
            }
    
            function updateColor() {
                var currentTime = performance.now();
                var elapsedTime = currentTime - startTime;
                var progress = Math.min(elapsedTime / speed, 1);
    
                // Interpolate between currentColor and targetColor
                var r1 = parseInt(currentColor.slice(1, 3), 16);
                var g1 = parseInt(currentColor.slice(3, 5), 16);
                var b1 = parseInt(currentColor.slice(5, 7), 16);
    
                var r2 = parseInt(targetColor.slice(1, 3), 16);
                var g2 = parseInt(targetColor.slice(3, 5), 16);
                var b2 = parseInt(targetColor.slice(5, 7), 16);
    
                var r = Math.round(r1 + (r2 - r1) * progress);
                var g = Math.round(g1 + (g2 - g1) * progress);
                var b = Math.round(b1 + (b2 - b1) * progress);
    
                currentColor = `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
    
                // Fill the canvas with the current color
                ctx.fillStyle = currentColor;
                ctx.fillRect(0, 0, width, height);
    
                if (progress < 1) {
                    window.requestAnimationFrame(updateColor);
                }
            }
        }

    }
    // function resolvePausedState(state) {
    //     if (typeof state === "undefined") {
    //         return false;
    //     }
    //     return state === true || state === 1 || state === "1";
    // }

    window.requestAnimationFrame(fadeToTargetColor);

</script>
